<!-- SCANLINES -->
<rect width="800" height="310" fill="url(#scan)"/>

<!-- CENTER PANEL — altura aumentada para caber frases -->
<rect x="125" y="55" width="550" height="200" rx="2" fill="rgba(5,8,16,0.88)"/>

<!-- Corner brackets — top cyan -->
<path d="M125 80 L125 55 L150 55" stroke="#00f5ff" stroke-width="1.5" fill="none" opacity=".6"/>
<path d="M650 55 L675 55 L675 80" stroke="#00f5ff" stroke-width="1.5" fill="none" opacity=".6"/>
<!-- Corner brackets — bottom magenta -->
<path d="M125 230 L125 255 L150 255" stroke="#ff2d78" stroke-width="1.5" fill="none" opacity=".6"/>
<path d="M650 255 L675 255 L675 230" stroke="#ff2d78" stroke-width="1.5" fill="none" opacity=".6"/>
<!-- Partial border lines -->
<line x1="152" y1="55" x2="648" y2="55" stroke="#00f5ff" stroke-width="1" opacity=".2"/>
<line x1="152" y1="255" x2="648" y2="255" stroke="#ff2d78" stroke-width="1" opacity=".2"/>

<!-- Panel label -->
<text x="143" y="76" font-family="'Courier New',monospace" font-size="10" fill="#ff2d78" opacity=".75" letter-spacing="2">&gt; PORTFOLIO.SH</text>

<!-- TITLE -->
<text class="title" x="400" y="148" text-anchor="middle"
  font-family="Impact,'Arial Black',Arial,sans-serif"
  font-size="56" font-weight="900" fill="white" filter="url(#gw)">Igor Matheus</text>

<!-- SUBTITLE fixo -->
<text x="400" y="173" text-anchor="middle"
  font-family="'Courier New',Courier,monospace"
  font-size="12.5" fill="#00f5ff" letter-spacing="2.5" opacity=".88">Back-End Developer  ·  Cloud Engineer</text>

<!-- DIVISOR sutil -->
<line x1="250" y1="183" x2="550" y2="183" stroke="#00f5ff" stroke-width="0.5" opacity=".2"/>

<!-- FRASES ANIMADAS — aparecem em loop dentro do painel -->
<text class="phrase p1" x="400" y="202">Desenvolvedor Back-End</text>
<text class="phrase p2" x="400" y="202">Java · Spring Boot 3 · Python · AWS</text>
<text class="phrase p3" x="400" y="202">APIs RESTful · Docker · Terraform · CI/CD</text>
<text class="phrase p4" x="400" y="202">Resiliencia da logistica aplicada no codigo</text>

