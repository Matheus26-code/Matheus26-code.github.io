<rect class="tcursor tc2" x="556" y="192" width="6" height="10"/>
<rect class="tcursor tc3" x="566" y="192" width="6" height="10"/>
<rect class="tcursor tc4" x="548" y="192" width="6" height="10"/>

<!-- Terminal prompt + blinking cursor -->
<text x="143" y="248" font-family="'Courier New',monospace" font-size="10" fill="#00f5ff" opacity=".5">~$</text>
<rect class="blink" x="162" y="238" width="7" height="10" fill="#00f5ff" opacity=".7"/>

