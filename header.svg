<g class="r rm c8"><text x="308" y="0" opacity=".4">1</text><text x="308" y="18" fill="#00f5ff" opacity=".1">0</text><text x="308" y="36" fill="#00f5ff" opacity=".08">{</text><text x="308" y="54" fill="#00f5ff" opacity=".06">}</text><text x="308" y="72" fill="#00f5ff" opacity=".05">|</text><text x="308" y="90" fill="#00f5ff" opacity=".04">/</text><text x="308" y="108" fill="#00f5ff" opacity=".03">\</text></g>
<g class="r rc c9"><text x="400" y="0" opacity=".4">0</text><text x="400" y="18" opacity=".09">1</text><text x="400" y="36" opacity=".07">;</text><text x="400" y="54" opacity=".05">#</text><text x="400" y="72" opacity=".04">@</text><text x="400" y="90" opacity=".03">{</text></g>
<g class="r rc c10"><text x="490" y="0" opacity=".42">1</text><text x="490" y="18" opacity=".09">0</text><text x="490" y="36" opacity=".07">=</text><text x="490" y="54" opacity=".05">+</text><text x="490" y="72" opacity=".04">?</text><text x="490" y="90" opacity=".03">!</text></g>

