<svg xmlns="http://www.w3.org/2000/svg" width="800" height="310" viewBox="0 0 800 310">
<defs>
  <style>
    .r{animation:fall linear infinite;font-family:'Courier New',monospace;font-size:13px}
    .rc{fill:#00f5ff}.rm{fill:#ff2d78}
    .c1{animation-duration:4.2s;animation-delay:0s}
    .c2{animation-duration:3.6s;animation-delay:-2.1s}
    .c3{animation-duration:5.0s;animation-delay:-0.8s}
    .c4{animation-duration:3.9s;animation-delay:-3.5s}
    .c5{animation-duration:4.7s;animation-delay:-1.3s}
    .c6{animation-duration:3.3s;animation-delay:-4.0s}
    .c7{animation-duration:5.4s;animation-delay:-2.7s}
    .c8{animation-duration:4.1s;animation-delay:-0.6s}
    .c9{animation-duration:3.8s;animation-delay:-3.1s}
    .c10{animation-duration:5.1s;animation-delay:-1.9s}
    .c11{animation-duration:4.4s;animation-delay:-4.6s}
    .c12{animation-duration:3.4s;animation-delay:-0.4s}
    .c13{animation-duration:4.9s;animation-delay:-2.4s}
    .c14{animation-duration:3.7s;animation-delay:-3.8s}
    .c15{animation-duration:5.2s;animation-delay:-1.0s}
    .c16{animation-duration:4.0s;animation-delay:-4.2s}
    .c17{animation-duration:3.5s;animation-delay:-2.9s}
    .c18{animation-duration:4.6s;animation-delay:-0.7s}
    @keyframes fall{from{transform:translateY(-220px)}to{transform:translateY(340px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes breathe{0%,100%{opacity:.88}50%{opacity:1}}
    .blink{animation:blink 1s step-end infinite}
    .title{animation:breathe 3s ease-in-out infinite}

    /* Typing animation — 4 frases, cada uma dura 3s visível + 1s fade */
    .phrase{
      font-family:'Courier New',monospace;
      font-size:11px;
      fill:#00f5ff;
      letter-spacing:1.5px;
      text-anchor:middle;
      opacity:0;
    }
    .p1{animation:typing 12s ease-in-out infinite 0s}
    .p2{animation:typing 12s ease-in-out infinite 3s}
    .p3{animation:typing 12s ease-in-out infinite 6s}
    .p4{animation:typing 12s ease-in-out infinite 9s}
    @keyframes typing{
      0%{opacity:0}
      5%{opacity:.9}
      20%{opacity:.9}
      25%{opacity:0}
      100%{opacity:0}
    }

    /* cursor piscante ao lado do texto */
    .tcursor{
      fill:#00f5ff;
      opacity:0;
      animation:tcblink 12s ease-in-out infinite;
    }
    .tc1{animation-delay:0s}
    .tc2{animation-delay:3s}
    .tc3{animation-delay:6s}
    .tc4{animation-delay:9s}
    @keyframes tcblink{
      0%{opacity:0}
      5%{opacity:.8}
      10%{opacity:0}
      15%{opacity:.8}
      20%{opacity:0}
      25%{opacity:0}
      100%{opacity:0}
    }
  </style>
  <filter id="gw" x="-30%" y="-40%" width="160%" height="180%">
    <feGaussianBlur stdDeviation="5" in="SourceGraphic" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="botg" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%"   stop-color="#050810"/>
    <stop offset="30%"  stop-color="#00f5ff"/>
    <stop offset="70%"  stop-color="#ff2d78"/>
    <stop offset="100%" stop-color="#050810"/>
  </linearGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#00f5ff" stroke-width="0.6" opacity="0.05"/>
  </pattern>
  <pattern id="scan" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect width="800" height="2" y="2" fill="#000" opacity="0.1"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="800" height="310" fill="#050810"/>
<rect width="800" height="310" fill="url(#grid)"/>

<!-- MATRIX RAIN — left zone -->
