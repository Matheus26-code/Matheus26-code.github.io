<!-- Terminal prompt + cursor piscante (SMIL) -->
<text x="143" y="248" font-family="'Courier New',monospace" font-size="10" fill="#00f5ff" opacity=".5">~$</text>
<rect x="162" y="238" width="7" height="10" fill="#00f5ff">
  <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- BOTTOM GRADIENT BAR -->
<rect x="0" y="304" width="800" height="4" fill="url(#botg)"/>
</svg>
